[package]
name = "arb-sepolia-import"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Build a self-contained ExecutionFixture from a real Arbitrum Sepolia transaction by pulling per-contract storage from an archive RPC."

[dependencies]
alloy-primitives = { workspace = true, features = ["std", "serde"] }
anyhow = "1"
clap = { version = "4", features = ["derive", "env"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
ureq = { version = "2", default-features = false, features = ["json", "tls"] }

[lints]
workspace = true
