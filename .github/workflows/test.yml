name: test

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  nextest:
    name: unit tests (nextest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
      - name: Init submodules with retry
        shell: bash
        run: |
          for i in 1 2 3; do
            if git submodule update --init --recursive --depth 1; then
              echo "Submodules initialized"
              exit 0
            fi
            echo "Submodule init attempt $i failed; sleeping $((i*5))s before retry"
            sleep $((i*5))
          done
          echo "Submodule init failed after 3 attempts"
          exit 1
      - uses: dtolnay/rust-toolchain@1.93
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Run unit + integration tests
        run: cargo nextest run --workspace --profile ci

  doctests:
    name: doctests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
      - name: Init submodules with retry
        shell: bash
        run: |
          for i in 1 2 3; do
            if git submodule update --init --recursive --depth 1; then
              echo "Submodules initialized"
              exit 0
            fi
            echo "Submodule init attempt $i failed; sleeping $((i*5))s before retry"
            sleep $((i*5))
          done
          echo "Submodule init failed after 3 attempts"
          exit 1
      - uses: dtolnay/rust-toolchain@1.93
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --doc --workspace
