name: lint

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo +nightly fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.93
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  docs:
    name: docs
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings -A rustdoc::broken-intra-doc-links"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.93
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps

  no-hand-written-selectors:
    name: no hand-written selectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Fail if any bare [u8; 4] selector literals are reintroduced
        run: |
          set -e
          matches=$(grep -rnE 'const\s+[A-Z_0-9]+\s*:\s*\[\s*u8\s*;\s*4\s*\]\s*=' \
            crates/arb-precompiles/src/ || true)
          if [ -n "$matches" ]; then
            echo "Hand-written function-selector constants are not allowed in arb-precompiles/src/."
            echo "Precompile selectors must come from the sol!-generated SolCall::SELECTOR."
            echo "$matches"
            exit 1
          fi
