name: dependencies

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: "0 0 * * 1" # every Monday

env:
  CARGO_TERM_COLOR: always

jobs:
  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
      - name: Init submodules with retry
        shell: bash
        run: |
          for i in 1 2 3; do
            if git submodule update --init --recursive --depth 1; then
              echo "Submodules initialized"
              exit 0
            fi
            echo "Submodule init attempt $i failed; sleeping $((i*5))s before retry"
            sleep $((i*5))
          done
          echo "Submodule init failed after 3 attempts"
          exit 1
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
