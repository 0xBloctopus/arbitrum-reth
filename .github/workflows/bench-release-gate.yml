name: bench-release-gate

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or branch to evaluate"
        required: true
        default: "master"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    uses: ./.github/workflows/_build-release.yml
    with:
      artifact-name: bench-release-gate-binaries
      ref: ${{ inputs.ref }}
      include-bench-driver: true

  release-gate:
    name: full matrix
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 1440
    strategy:
      fail-fast: false
      matrix:
        arbos: [30, 40, 50, 60]
        config: [default, aggressive-flush, with-pruner, large-cache]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          submodules: false
      - name: Init submodules with retry
        shell: bash
        run: |
          for i in 1 2 3; do
            if git submodule update --init --recursive --depth 1; then
              echo "Submodules initialized"
              exit 0
            fi
            echo "Submodule init attempt $i failed; sleeping $((i*5))s before retry"
            sleep $((i*5))
          done
          echo "Submodule init failed after 3 attempts"
          exit 1
      - uses: actions/download-artifact@v4
        with:
          name: bench-release-gate-binaries
          path: target/release
      - name: Make binaries executable
        run: chmod +x target/release/arbreth-bench target/release/arb-reth
      - name: Run full corpus
        run: |
          target/release/arbreth-bench run \
            bench/corpus/synthetic \
            bench/corpus/sepolia \
            --out target/bench/release-gate/arbos-${{ matrix.arbos }}-${{ matrix.config }}
        env:
          RUST_LOG: arb_bench=info
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: release-arbos-${{ matrix.arbos }}-${{ matrix.config }}
          path: target/bench/release-gate
          retention-days: 365
