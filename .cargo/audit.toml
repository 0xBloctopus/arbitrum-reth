# Advisories ignored by `cargo audit`.
# Keep this list aligned with the `[advisories.ignore]` block in deny.toml.
# Every entry below is transitive via reth, wasmer, or revm's ark-* deps,
# and cannot be fixed without an upstream version bump or fork.

[advisories]
ignore = [
    "RUSTSEC-2021-0139", # ansi_term unmaintained - transitive via vendored wasmer
    "RUSTSEC-2021-0145", # atty potential unaligned read - transitive via vendored wasmer
    "RUSTSEC-2024-0370", # proc-macro-error unmaintained - transitive via reth
    "RUSTSEC-2024-0375", # atty unmaintained - transitive via vendored wasmer
    "RUSTSEC-2024-0388", # derivative unmaintained - transitive via reth
    "RUSTSEC-2024-0436", # paste unmaintained - transitive via reth
    "RUSTSEC-2025-0055", # tracing-subscriber ANSI escape - transitive via revm/ark-relations
    "RUSTSEC-2025-0057", # fxhash unmaintained - transitive via reth
    "RUSTSEC-2025-0141", # bincode unmaintained - transitive via reth
    "RUSTSEC-2026-0002", # lru IterMut stacked borrows - transitive via reth/discv5
    "RUSTSEC-2026-0037", # quinn-proto DoS - transitive via reth/reqwest
    "RUSTSEC-2026-0041", # lz4_flex decompression - transitive via reth
    "RUSTSEC-2026-0067", # tar unpack_in symlink - transitive via reth
    "RUSTSEC-2026-0068", # tar PAX size headers - transitive via reth
    "RUSTSEC-2026-0105", # core2 unmaintained - transitive via reth/discv5/multihash
    "RUSTSEC-2026-0118", # hickory-dns NSEC3 - transitive via reth/discv5
    "RUSTSEC-2026-0119", # hickory-dns name compression - transitive via reth/discv5
]
