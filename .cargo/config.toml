# wasmer_vm 7.1.0 ships a `__rust_probestack` symbol because Cranelift-emitted
# JIT WASM code calls it at runtime to probe its native stack. When wasmer_vm is
# statically linked into a Rust binary, that symbol collides with the
# compiler-builtins `__rust_probestack` that rustc auto-emits on x86_64. Both
# implementations are byte-identical stack-probe assembly, so letting the linker
# pick the first definition is safe and has no behavioural effect.
#
# Scoped narrowly to Linux x86_64 (lld) — macOS uses ld64 and aarch64 doesn't
# emit a compiler-builtins probestack, so no collision on those targets.
[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-Wl,--allow-multiple-definition"]

[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "link-arg=-Wl,--allow-multiple-definition"]
