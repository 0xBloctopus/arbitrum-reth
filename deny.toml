[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]
all-features = true

[advisories]
vulnerability = "deny"
unmaintained = "ignore"
yanked = "ignore"
notice = "ignore"

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "BUSL-1.1",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
]

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "arb-primitives"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "arb-chainspec"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "arb-storage"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "arb-evm"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "arb-precompiles"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "arb-node"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "arb-payload"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "arb-rpc"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "arb-txpool"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "arb-stylus"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "arbos"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "arb-reth"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "gen-genesis"

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = [
    "https://github.com/paradigmxyz/reth",
    "https://github.com/tiljrd/arb-alloy",
]
